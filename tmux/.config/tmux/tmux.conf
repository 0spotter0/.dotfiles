unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

set-window-option -g mode-keys vi

unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Prevent shift+space from sending unwanted characters to the shell
bind-key -n S-Space send-keys " "

unbind h
bind h select-pane -L
unbind j
bind j select-pane -D
unbind k
bind k select-pane -U
unbind l
bind l select-pane -R

set -g @plugin 'tmux-plugins/tpm'

set -g mouse on

# Open new windows in the current directory
bind c new-window -c "#{pane_current_path}"

# Open new panes (splits) in the current directory
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Enable shift-enter for newline
set -g extended-keys always
set -as terminal-features 'xterm*:extkeys'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
if-shell '[[ "$OSTYPE" == "darwin"* ]]' \
    "run '$HOMEBREW_PREFIX/opt/tpm/share/tpm/tpm'" \
    "run '~/.tmux/plugins/tpm/tpm'"
